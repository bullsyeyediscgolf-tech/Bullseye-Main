<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedule — Bullseye Fantasy DG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .schedule-grid { display: flex; flex-direction: column; gap: 12px; }
    .tournament-row {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .tournament-row:hover { border-color: var(--accent); }
    .tournament-row.is-active { border-color: var(--red); box-shadow: 0 0 16px rgba(231,76,60,0.1); }
    .tournament-row.is-completed { opacity: 0.65; }
    .tournament-main {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 16px 20px;
      cursor: pointer;
    }
    .t-date-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 56px;
    }
    .t-month { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; }
    .t-day { font-family: var(--font-display); font-size: 2.2rem; line-height: 1; color: var(--accent); }
    .t-day.completed { color: var(--text-muted); }
    .t-info { flex: 1; }
    .t-name { font-weight: 700; font-size: 1.05rem; margin-bottom: 3px; }
    .t-meta { font-size: 0.8rem; color: var(--text-muted); display: flex; gap: 12px; flex-wrap: wrap; }
    .t-meta span { display: flex; align-items: center; gap: 4px; }
    .t-actions { display: flex; align-items: center; gap: 10px; }
    .t-expand-icon {
      color: var(--text-muted);
      transition: transform 0.2s;
      font-size: 1rem;
    }
    .tournament-row.expanded .t-expand-icon { transform: rotate(180deg); }

    /* Expanded panel */
    .tournament-detail {
      border-top: 1px solid var(--border-subtle);
      display: none;
      padding: 16px 20px;
      background: var(--bg-primary);
    }
    .tournament-row.expanded .tournament-detail { display: block; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }

    /* Signed up players */
    .signed-up-section { margin-top: 12px; }
    .signed-up-title {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text-muted); margin-bottom: 10px;
    }
    .signed-up-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 6px;
    }
    .signed-up-player {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
    }
    .signed-up-player.on-my-roster {
      border: 1px solid var(--accent);
      background: var(--accent-dim);
    }
    .roster-indicator {
      font-size: 0.6rem;
      font-weight: 700;
      background: var(--accent);
      color: #0A0C0F;
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: auto;
      white-space: nowrap;
    }
    .my-lineup-section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border-subtle);
    }
    .my-lineup-title {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text-muted); margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .lineup-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .lineup-chip {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 10px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.78rem;
    }
    @media (max-width: 768px) {
      .detail-grid { grid-template-columns: 1fr 1fr; }
      .tournament-main { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <svg width="28" height="28" viewBox="0 0 56 56" fill="none">
        <circle cx="28" cy="28" r="27" stroke="#F5A623" stroke-width="2"/>
        <circle cx="28" cy="28" r="16" stroke="#F5A623" stroke-width="1.5"/>
        <circle cx="28" cy="28" r="5" fill="#F5A623"/>
      </svg>
      <span class="sidebar-logo">BULLSEYE</span>
      <span class="sidebar-season">2026</span>
    </div>
    <div class="sidebar-league">
      <div class="league-selector">
        <span class="league-selector-label">League</span>
        <span class="league-selector-name" id="league-name-display">Loading...</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="dashboard.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard
      </a>
      <a href="schedule.html" class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Schedule
      </a>
      <div class="nav-section-label">My Team</div>
      <a href="roster.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Roster
      </a>
      <a href="lineup.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>Set Lineup
      </a>
      <div class="nav-section-label">League</div>
      <a href="standings.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 20 18 10"/><polyline points="12 20 12 4"/><polyline points="6 20 6 14"/></svg>Standings
      </a>
<a href="waivers.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Waivers
      </a>
      <a href="trades.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>Trades
      </a>
      <a href="players.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg>Player Pool
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">??</div>
        <div><div class="user-name" id="user-display-name">Loading...</div></div>
        <button class="logout-btn" id="logout-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <h1 class="topbar-title">2026 Schedule</h1>
      <div class="topbar-actions">
        <span class="badge badge-es" style="font-size:0.72rem;">Elite Series</span>
        <span class="badge badge-major" style="font-size:0.72rem;">Majors</span>
      </div>
    </header>

    <div class="page-content">
      <div id="loading-state">
        <div style="display:flex;flex-direction:column;gap:12px;">
          <div class="skeleton" style="height:80px;border-radius:10px;"></div>
          <div class="skeleton" style="height:80px;border-radius:10px;"></div>
          <div class="skeleton" style="height:80px;border-radius:10px;"></div>
        </div>
      </div>
      <div id="schedule-content" class="hidden schedule-grid"></div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script>
let myRosterIds = new Set();
let myLineups = {};

document.addEventListener('DOMContentLoaded', async () => {
  const user = await requireAuth();
  if (!user) return;

  const name = user.user_metadata?.display_name || user.email.split('@')[0];
  document.getElementById('user-avatar').textContent = getInitials(name);
  document.getElementById('user-display-name').textContent = name;
  document.getElementById('logout-btn').addEventListener('click', async () => {
    await db.auth.signOut(); window.location.href = '../index.html';
  });

  // Load team + roster
  const { data: teams } = await db.from('teams').select('*, leagues(*)').eq('manager_id', user.id);
  if (teams?.length) {
    const savedId = getSelectedTeamId();
    const myTeam = (savedId ? teams.find(t => t.id === savedId) : null) || teams[0];
    document.getElementById('league-name-display').textContent = myTeam.leagues?.name || '—';
    const { data: roster } = await db.from('rosters').select('player_id').eq('team_id', myTeam.id).eq('is_active', true);
    myRosterIds = new Set((roster || []).map(r => r.player_id));

    // Load all my lineups
    const { data: lineups } = await db.from('lineups').select('*, players(*)').eq('team_id', myTeam.id);
    (lineups || []).forEach(l => {
      if (!myLineups[l.tournament_id]) myLineups[l.tournament_id] = [];
      myLineups[l.tournament_id].push(l);
    });
  }

  // Load tournaments
  const { data: tournaments } = await db
    .from('tournaments').select('*')
    .eq('season', 2026)
    .order('start_date', { ascending: true });

  // Load entries for all tournaments
  const { data: entries } = await db
    .from('tournament_entries').select('*, players(*)')
    .in('tournament_id', (tournaments || []).map(t => t.id));

  const entriesByTournament = {};
  (entries || []).forEach(e => {
    if (!entriesByTournament[e.tournament_id]) entriesByTournament[e.tournament_id] = [];
    entriesByTournament[e.tournament_id].push(e);
  });

  document.getElementById('loading-state').classList.add('hidden');
  const container = document.getElementById('schedule-content');
  container.classList.remove('hidden');

  if (!tournaments?.length) {
    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📅</div><div class="empty-state-title">No tournaments scheduled</div></div>';
    return;
  }

  (tournaments || []).forEach(t => {
    const isActive = t.status === 'active';
    const isCompleted = t.status === 'completed';
    const d = new Date(t.start_date);
    const tierBadge = t.tier === 'Major' || t.tier === 'Champions Cup'
      ? '<span class="badge badge-major">MAJOR</span>'
      : '<span class="badge badge-es">ES</span>';
    const statusBadge = isActive
      ? '<span class="badge badge-live">LIVE</span>'
      : isCompleted ? '<span class="badge badge-completed">FINAL</span>' : '';
    const tournamentEntries = entriesByTournament[t.id] || [];
    const myLineup = myLineups[t.id] || [];
    const myRosterInEvent = tournamentEntries.filter(e => myRosterIds.has(e.player_id));

    const row = document.createElement('div');
    row.className = `tournament-row ${isActive ? 'is-active' : ''} ${isCompleted ? 'is-completed' : ''}`;
    row.innerHTML = `
      <div class="tournament-main" onclick="toggleExpand(this.parentElement)">
        <div class="t-date-block">
          <div class="t-month">${d.toLocaleDateString('en-US',{month:'short'})}</div>
          <div class="t-day ${isCompleted ? 'completed' : ''}">${d.getDate()}</div>
        </div>
        <div class="t-info">
          <div class="t-name">${t.name}</div>
          <div class="t-meta">
            <span>📍 ${t.location || 'TBD'}</span>
            <span>📅 ${formatDateRange(t.start_date, t.end_date)}</span>
            ${tournamentEntries.length ? `<span>👥 ${tournamentEntries.length} players signed up</span>` : ''}
            ${myRosterInEvent.length ? `<span style="color:var(--accent);">⭐ ${myRosterInEvent.length} on your roster</span>` : ''}
          </div>
        </div>
        <div class="t-actions">
          ${tierBadge} ${statusBadge}
          ${!isCompleted ? `<a href="lineup.html" class="btn-accent btn-sm" onclick="event.stopPropagation()">Set Lineup</a>` : ''}
          <span class="t-expand-icon">▼</span>
        </div>
      </div>
      <div class="tournament-detail">
        <div class="detail-grid">
          <div class="stat-chip">
            <span class="stat-chip-label">Dates</span>
            <span class="stat-chip-value" style="font-size:1rem;">${formatDateRange(t.start_date, t.end_date)}</span>
          </div>
          <div class="stat-chip">
            <span class="stat-chip-label">Tier</span>
            <span class="stat-chip-value" style="font-size:1rem;">${t.tier}</span>
          </div>
          <div class="stat-chip">
            <span class="stat-chip-label">Status</span>
            <span class="stat-chip-value" style="font-size:1rem;${isActive ? 'color:var(--red)' : ''}">${t.status.toUpperCase()}</span>
          </div>
        </div>

        ${myLineup.length ? `
          <div class="my-lineup-section">
            <div class="my-lineup-title">
              My Lineup
              <a href="lineup.html" style="font-size:0.72rem;color:var(--accent);font-weight:600;margin-left:auto;">Edit →</a>
            </div>
            <div class="lineup-chips">
              ${myLineup.map(l => `
                <div class="lineup-chip">
                  <span class="pos-badge pos-${l.position}">${l.position === 'approacher' ? 'APP' : l.position.toUpperCase().slice(0,3)}</span>
                  ${l.players?.name || '—'}
                </div>
              `).join('')}
            </div>
          </div>
        ` : !isCompleted ? `
          <div style="margin-top:12px;padding:12px;background:rgba(245,166,35,0.05);border:1px dashed var(--accent);border-radius:8px;font-size:0.82rem;color:var(--accent);">
            ⚠️ No lineup set for this tournament.
            <a href="lineup.html" style="color:var(--accent);font-weight:700;margin-left:4px;">Set it now →</a>
          </div>
        ` : ''}

        ${tournamentEntries.length ? `
          <div class="signed-up-section">
            <div class="signed-up-title">
              Signed Up Players (${tournamentEntries.length})
              ${myRosterInEvent.length ? `· <span style="color:var(--accent);">${myRosterInEvent.length} on your roster</span>` : ''}
            </div>
            <div class="signed-up-grid">
              ${tournamentEntries.slice(0,40).map(e => {
                const onRoster = myRosterIds.has(e.player_id);
                return `
                  <div class="signed-up-player ${onRoster ? 'on-my-roster' : ''}">
                    <div class="player-avatar" style="width:24px;height:24px;font-size:0.6rem;flex-shrink:0;">${getInitials(e.players?.name)}</div>
                    <span style="font-size:0.78rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${e.players?.name || '—'}</span>
                    ${onRoster ? '<span class="roster-indicator">MINE</span>' : ''}
                  </div>`;
              }).join('')}
              ${tournamentEntries.length > 40 ? `<div style="padding:6px 8px;font-size:0.75rem;color:var(--text-muted);">+${tournamentEntries.length - 40} more</div>` : ''}
            </div>
          </div>
        ` : `<div style="margin-top:12px;font-size:0.82rem;color:var(--text-muted);">Player registrations not yet available for this event.</div>`}
      </div>
    `;
    container.appendChild(row);
  });
});

function toggleExpand(row) {
  row.classList.toggle('expanded');
}
</script>
</body>
</html>
