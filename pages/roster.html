<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roster — Bullseye Fantasy DG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .roster-grid {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 20px;
    }
    .roster-player-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-subtle);
      background: var(--bg-primary);
      transition: all 0.2s;
    }
    .roster-player-row:hover {
      border-color: var(--border);
      background: var(--bg-card-hover);
    }
    .roster-player-num {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-muted);
      width: 20px;
      text-align: right;
    }
    .roster-player-rating {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-secondary);
      margin-left: auto;
    }
    .acquired-chip {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .acquired-draft { background: var(--blue-dim); color: var(--blue); }
    .acquired-waiver { background: var(--accent-dim); color: var(--accent); }
    .acquired-trade { background: rgba(139,92,246,0.15); color: var(--purple); }
    @media (max-width: 900px) { .roster-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <svg width="28" height="28" viewBox="0 0 56 56" fill="none">
        <circle cx="28" cy="28" r="27" stroke="#F5A623" stroke-width="2"/>
        <circle cx="28" cy="28" r="16" stroke="#F5A623" stroke-width="1.5"/>
        <circle cx="28" cy="28" r="5" fill="#F5A623"/>
      </svg>
      <span class="sidebar-logo">BULLSEYE</span>
      <span class="sidebar-season">2026</span>
    </div>
    <div class="sidebar-league">
      <div class="league-selector">
        <span class="league-selector-label">League</span>
        <span class="league-selector-name" id="league-name-display">Loading...</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="dashboard.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard
      </a>
      <a href="schedule.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Schedule
      </a>
      <div class="nav-section-label">My Team</div>
      <a href="roster.html" class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Roster
      </a>
      <a href="lineup.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>Set Lineup
      </a>
      <div class="nav-section-label">League</div>
      <a href="standings.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 20 18 10"/><polyline points="12 20 12 4"/><polyline points="6 20 6 14"/></svg>Standings
      </a>
      <a href="draft.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>Draft
      </a>
      <a href="waivers.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Waivers
      </a>
      <a href="trades.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>Trades
      </a>
      <a href="players.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg>Player Pool
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">??</div>
        <div>
          <div class="user-name" id="user-display-name">Loading...</div>
          <div class="user-role">Manager</div>
        </div>
        <button class="logout-btn" id="logout-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <h1 class="topbar-title" id="page-title">My Roster</h1>
      <div class="topbar-actions">
        <a href="lineup.html" class="btn-accent btn-sm">Set Lineup →</a>
      </div>
    </header>

    <div class="page-content">
      <div id="loading-state">
        <div class="skeleton" style="height:400px;border-radius:10px;"></div>
      </div>

      <div id="roster-content" class="hidden">
        <div class="roster-grid">
          <div>
            <div class="card">
              <div class="card-header">
                <h2 class="card-title" id="team-name-title">My Team</h2>
                <div style="display:flex;gap:8px;align-items:center;">
                  <span id="roster-count" class="text-sm text-muted"></span>
                  <span id="faab-display" class="badge" style="background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent);"></span>
                </div>
              </div>
              <div id="roster-list" style="display:flex;flex-direction:column;gap:8px;">
                <!-- Injected -->
              </div>
            </div>
          </div>

          <div style="display:flex;flex-direction:column;gap:16px;">
            <div class="card">
              <div class="card-header"><h2 class="card-title">Team Stats</h2></div>
              <div style="display:flex;flex-direction:column;gap:8px;" id="team-stats">
                <!-- Injected -->
              </div>
            </div>
            <div class="card">
              <div class="card-header"><h2 class="card-title">Quick Links</h2></div>
              <div style="display:flex;flex-direction:column;gap:8px;">
                <a href="lineup.html" class="btn-secondary btn-sm">📋 Set Tournament Lineup</a>
                <a href="waivers.html" class="btn-secondary btn-sm">🔄 Waiver Wire</a>
                <a href="trades.html" class="btn-secondary btn-sm">↔ Propose Trade</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const user = await requireAuth();
  if (!user) return;

  const name = user.user_metadata?.display_name || user.email.split('@')[0];
  document.getElementById('user-avatar').textContent = getInitials(name);
  document.getElementById('user-display-name').textContent = name;
  document.getElementById('logout-btn').addEventListener('click', async () => {
    await db.auth.signOut(); window.location.href = '../index.html';
  });

  // Load team
  const { data: teams } = await db
    .from('teams')
    .select('*, leagues(*)')
    .eq('manager_id', user.id);

  if (!teams?.length) { window.location.href = 'leagues.html'; return; }

  const savedId = getSelectedTeamId();
  const team = (savedId ? teams.find(t => t.id === savedId) : null) || teams[0];
  document.getElementById('league-name-display').textContent = team.leagues?.name || '—';
  document.getElementById('team-name-title').textContent = team.name;
  document.getElementById('page-title').textContent = team.name;
  document.getElementById('faab-display').textContent = `$${team.faab_balance} FAAB`;

  // Load roster
  const { data: roster } = await db
    .from('rosters')
    .select('*, players(*)')
    .eq('team_id', team.id)
    .eq('is_active', true)
    .order('acquired_at', { ascending: true });

  document.getElementById('loading-state').classList.add('hidden');
  document.getElementById('roster-content').classList.remove('hidden');

  const teamSize = team.leagues?.settings?.team_size || 7;
  document.getElementById('roster-count').textContent = `${roster?.length || 0} / ${teamSize} players`;

  if (!roster?.length) {
    document.getElementById('roster-list').innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">👥</div>
        <div class="empty-state-title">No players yet</div>
        <div class="empty-state-desc">Your roster will be filled after the draft.</div>
      </div>
    `;
  } else {
    const html = roster.map((r, i) => `
      <div class="roster-player-row">
        <span class="roster-player-num">${i + 1}</span>
        <div class="player-avatar">${getInitials(r.players?.name)}</div>
        <div class="player-info">
          <div class="player-name">${r.players?.name || '—'}</div>
          <div class="player-meta">PDGA #${r.players?.pdga_number || '—'}</div>
        </div>
        <span class="acquired-chip acquired-${r.acquired_via}">${r.acquired_via}</span>
        <span class="roster-player-rating">${r.players?.pdga_rating || '—'}</span>
      </div>
    `).join('');
    document.getElementById('roster-list').innerHTML = html;

    // Team stats
    const avgRating = roster.reduce((s, r) => s + (r.players?.pdga_rating || 0), 0) / roster.length;
    document.getElementById('team-stats').innerHTML = `
      <div class="stat-chip">
        <span class="stat-chip-label">Avg PDGA Rating</span>
        <span class="stat-chip-value">${Math.round(avgRating) || '—'}</span>
      </div>
      <div class="stat-chip">
        <span class="stat-chip-label">Roster Spots</span>
        <span class="stat-chip-value">${roster.length} / ${teamSize}</span>
      </div>
      <div class="stat-chip">
        <span class="stat-chip-label">FAAB Left</span>
        <span class="stat-chip-value accent">$${team.faab_balance}</span>
      </div>
    `;
  }
});
</script>
</body>
</html>
