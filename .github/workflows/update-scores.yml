name: Update Tournament Scores

on:
  schedule:
    # Runs every Sunday and Monday at 2:00 AM UTC (Sat/Sun evening US time)
    # Catches end-of-tournament results for most DGPT events
    - cron: '0 2 * * 0,1'
    # Also run at 11 PM UTC on Fri/Sat/Sun to catch live tournament updates
    - cron: '0 23 * * 5,6,0'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch scores from PDGA & update Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/update-scores.js
